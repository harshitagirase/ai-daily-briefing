name: Daily Morning Brief

on:
  schedule:
    - cron: '0 13 * * *'  # ~6:00 AM PDT (Mar–Nov)
    - cron: '0 14 * * *'  # ~6:00 AM PST (Nov–Mar)
  workflow_dispatch:       # allows manual trigger from GitHub UI

concurrency:
  group: daily-digest-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Deduplicate scheduled runs
        id: dedup
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger, proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Check if a digest was already committed today (Pacific time)
          # We'll do this after checkout, so for now just proceed
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Check if already ran today
        if: github.event_name != 'workflow_dispatch'
        id: already_ran
        run: |
          TODAY=$(TZ='America/Los_Angeles' date +'%Y-%m-%d')
          if git log --oneline --since="$TODAY" --grep="Daily brief: $TODAY" | grep -q .; then
            echo "Already generated today's brief, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No brief yet for $TODAY, proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.already_ran.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.already_ran.outputs.skip != 'true'
        run: pip install anthropic feedparser requests

      - name: Generate digest
        if: steps.already_ran.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/generate.py

      - name: Commit and push updated index.html
        if: steps.already_ran.outputs.skip != 'true'
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily brief: $(date +'%Y-%m-%d')"
          git push
