name: Daily Morning Brief

on:
  schedule:
    - cron: '0 13 * * *'  # 6:00 AM PDT (Mar–Nov)
    - cron: '0 14 * * *'  # 6:00 AM PST (Nov–Mar)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check if 6 AM Pacific
        id: tz_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger, proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PACIFIC_HOUR=$(TZ='America/Los_Angeles' date +'%H')
          if [ "$PACIFIC_HOUR" != "06" ]; then
            echo "Not 6 AM Pacific (hour=$PACIFIC_HOUR), skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.tz_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.tz_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.tz_check.outputs.skip != 'true'
        run: pip install anthropic feedparser requests

      - name: Generate digest
        if: steps.tz_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/generate.py

      - name: Commit and push updated index.html
        if: steps.tz_check.outputs.skip != 'true'
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily brief: $(date +'%Y-%m-%d')"
          git push
